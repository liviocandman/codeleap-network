services:
  # Backend Django
  - type: web
    name: codeleap-backend
    env: python
    region: ohio
    plan: free
    rootDir: backend
    buildCommand: "./build.sh"
    startCommand: "gunicorn config.wsgi:application"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: codeleap-db
          property: connectionString
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "codeleap-backend.onrender.com,localhost,127.0.0.1"
      - key: PYTHON_VERSION
        value: "3.11.4"

# PostgreSQL 
databases:
  - name: codeleap-db
    region: ohio
    plan: free
    databaseName: codeleap
    user: admin